services:
  redis:
    image: redis:7-alpine

  webhook:
    image: orchestra/orchestra:latest
    env_file:
      - .env
    environment:
      ORCHESTRA_REDIS_HOST: redis
    command: server --port 8000
    depends_on:
      - redis
    working_dir: /workspace
    volumes:
      - ./:/workspace

  musician:
    image: orchestra/orchestra:latest
    env_file:
      - .env
    environment:
      ORCHESTRA_REDIS_HOST: redis
    command: musician
    depends_on:
      - redis
    working_dir: /workspace
    volumes:
      - ./:/workspace

  scheduler:
    image: orchestra/orchestra:latest
    env_file:
      - .env
    environment:
      ORCHESTRA_REDIS_HOST: redis
    command: scheduler
    depends_on:
      - redis
    working_dir: /workspace
    volumes:
      - ./:/workspace

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - webhook
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
